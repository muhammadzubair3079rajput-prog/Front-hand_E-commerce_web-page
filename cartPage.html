<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArmoryX | Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Poppins,sans-serif;background:#0d0d0d;color:#e5e5e5}
nav{
  background:#111;padding:18px 60px;
  display:flex;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.1)
}
.logo{color:#00ffc8;font-size:26px;font-weight:bold}
.container{max-width:1100px;margin:50px auto;padding:20px}
h1{color:#00ffc8;margin-bottom:25px}
.cart-item{
  display:flex;align-items:center;
  background:#141414;margin-bottom:15px;
  padding:15px;border-radius:10px;
  transition:0.3s
}
.cart-item:hover{background:#1c1c1c}
.cart-item img{width:90px;border-radius:8px;cursor:pointer}
.info{flex:1;margin-left:20px}
.info h3{color:#00ffc8;cursor:pointer}
.controls{display:flex;align-items:center;gap:10px}
.controls button{
  background:#00ffc8;border:none;
  padding:6px 12px;font-weight:bold;cursor:pointer;
  transition:0.3s
}
.controls button:hover{opacity:0.8}
.remove{background:#ff4d4d!important;color:#fff}
.total{text-align:right;margin-top:30px;
font-size:22px;color:#00ffc8}
</style>
</head>

<body>

<nav>
  <div class="logo">ArmoryX</div>
  <a href="Home_Page.html" style="color:#00ffc8;text-decoration:none">⬅ Shop More</a>
</nav>

<div class="container">
  <h1>Your Cart</h1>
  <div id="cart"></div>
  <div class="total">Total: $<span id="total">0</span></div>
</div>

<script>
// Get cart from localStorage or empty
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Render cart items
function render(){
  const box = document.getElementById("cart");
  const totalEl = document.getElementById("total");
  box.innerHTML = "";
  let total = 0;

  cart.forEach((item,i)=>{
    total += item.price * item.qty;
    box.innerHTML += `
    <div class="cart-item">
      <img src="${item.img}" onclick="goToItem(${i})">
      <div class="info">
        <h3 onclick="goToItem(${i})">${item.name}</h3>
        <p>$${item.price}</p>
      </div>
      <div class="controls">
        <button onclick="qty(${i},-1)">-</button>
        <span>${item.qty}</span>
        <button onclick="qty(${i},1)">+</button>
        <button class="remove" onclick="remove(${i})">X</button>
      </div>
    </div>`;
  });
  totalEl.textContent = total.toFixed(2);
}

// Navigate to item page
function goToItem(i){
  if(cart[i].page) window.location.href = cart[i].page;
}

// Change quantity
function qty(i,v){
  cart[i].qty += v;
  if(cart[i].qty <= 0) cart.splice(i,1);
  save();
}

// Remove item
function remove(i){
  cart.splice(i,1);
  save();
}

// Save to localStorage and render
function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  render();
}

render();
</script>

</body>
</html>
